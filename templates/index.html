<!DOCTYPE html>
<html>
<head>
    <title>Clinic Queue</title>
</head>
<body>
    <h1>Clinic Waiting List</h1>

    <a href="/add">Add Patient</a>
    <a href="/serve">Serve Next Patient</a>

    <h2>Patients:</h2>
    <ul>
        {% for patient in patients %}
            <li>{{ patient.get_details() }}</li>
        {% endfor %}
    </ul>

    <h3>Total Served Today: {{ served }}</h3>
</body>
</html>
